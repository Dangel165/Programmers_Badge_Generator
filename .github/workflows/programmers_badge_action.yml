name: programmers_badge_action

on:
  push:
    branches: [ "main" ]
  repository_dispatch:
    types: [ trigger-workflow ]
  workflow_dispatch: # 직접 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run Java program
        env:
          # 특수문자가 포함된 비밀번호를 안전하게 전달하기 위해 따옴표 처리 권장
          PROGRAMMERS_TOKEN_ID: ${{ secrets.PROGRAMMERS_TOKEN_ID }}
          PROGRAMMERS_TOKEN_PW: ${{ secrets.PROGRAMMERS_TOKEN_PW }}
        run: ./gradlew run

      - name: Commit and Push changes
        env:
          # 이 레포의 푸시 권한을 위해 GH_PAT이 필요합니다.
          GH_PAT: ${{ secrets.GH_PAT }}
          GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
          GIT_NAME: ${{ secrets.GIT_NAME }}
        run: |
          git config --global user.email "${GIT_EMAIL}"
          git config --global user.name "${GIT_NAME}"
          git add .
          # 변경사항이 있을 때만 커밋 (에러 방지)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update badge" && git push https://${GH_PAT}@github.com/${{ github.repository }}.git HEAD:main)
