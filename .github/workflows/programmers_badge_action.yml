name: programmers_badge_action

on:
  push:
    branches: [ "main" ]
  repository_dispatch:
    types: [ trigger-workflow ]
  workflow_dispatch: # 직접 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        # clean을 추가하여 이전 빌드 기록이 영향을 주지 않게 합니다.
        run: ./gradlew clean build --no-daemon

      - name: Run Java program
        env:
          ID: ${{ secrets.PROGRAMMERS_TOKEN_ID }}
          PW: ${{ secrets.PROGRAMMERS_TOKEN_PW }}
        run: |
          # 환경 변수를 안전하게 전달하기 위해 .env 파일을 생성합니다.
          echo "PROGRAMMERS_TOKEN_ID=\"$ID\"" > .env
          echo "PROGRAMMERS_TOKEN_PW=\"$PW\"" >> .env
          ./gradlew run --no-daemon

      - name: Commit and Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
          GIT_NAME: ${{ secrets.GIT_NAME }}
        run: |
          git config --global user.email "${GIT_EMAIL}"
          git config --global user.name "${GIT_NAME}"
          git add .
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update badge"
            git push
          else
            echo "No changes to commit"
          fi
